[build]
command = "if cd flutter; then git pull && cd ..; else git clone https://github.com/flutter/flutter.git; fi && flutter/bin/flutter config --enable-web && flutter/bin/flutter build web --release --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY"
publish = "build/web"

[build.environment]
SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200