[build]
command = "if [ ! -d \"flutter\" ]; then git clone --depth 1 --branch stable https://github.com/flutter/flutter.git; fi && ./flutter/bin/flutter config --enable-web && ./flutter/bin/flutter build web --release --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY --no-tree-shake-icons"
publish = "build/web"

[build.environment]
SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza"
